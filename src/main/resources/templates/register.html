<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - TaskFlow</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
    <!-- Redirect to login after 3 seconds if registration is successful -->
    <meta http-equiv="refresh" content="3;url=/login" th:if="${msg}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <!-- Logo Section -->
            <div class="auth-logo">
                <div class="logo-icon">✓</div>
                <h1 class="logo-text">TaskFlow</h1>
            </div>

            <h2 class="auth-title">Register</h2>
            <p class="auth-subtitle">Create your account and stay organized.</p>

            <!-- Notification Box (Error) -->
            <div th:if="${error}" class="notification notification-error">
                <span th:text="${error}"></span>
                <button class="notification-close-btn" type="button" onclick="this.parentElement.style.display='none'">×</button>
            </div>
            
            <!-- Notification Box (Success) -->
            <div th:if="${msg}" class="notification notification-success">
                <span th:text="${msg}"></span>
                <button class="notification-close-btn" type="button" onclick="this.parentElement.style.display='none'">×</button>
            </div>

            <form th:action="@{/register}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" id="name" name="name" th:value="${registerData?.name}" placeholder="John Doe" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                        <input type="email" id="email" name="email" th:value="${registerData?.email}" placeholder="example@gmail.com" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 1a11 11 0 110 22 11 11 0 010-22zm-2 11a2 2 0 104 0 2 2 0 00-4 0z"/>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Enter password" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 1a11 11 0 110 22 11 11 0 010-22zm-2 11a2 2 0 104 0 2 2 0 00-4 0z"/>
                        </svg>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm password" required />
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit" disabled style="opacity: 0.5; cursor: not-allowed;">Sign Up</button>
            </form>

            <p class="auth-link">
                Already have an account? <a th:href="@{/login}">Login here</a>
            </p>
        </div>
    </div>

    <script>
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');

        function validateForm() {
            const isNameFilled = nameInput.value.trim() !== "";
            const isEmailFilled = emailInput.value.trim() !== "";
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            
            const isMatch = password === confirm && confirm !== "";
            
            // Visual feedback for password match
            if (confirm !== "") {
                if (isMatch) {
                    confirmInput.style.borderColor = "#22c55e";
                } else {
                    confirmInput.style.borderColor = "#ef4444";
                }
            } else {
                confirmInput.style.borderColor = "";
            }

            // Enable button only if all valid
            if (isNameFilled && isEmailFilled && isMatch && password.length >= 6) {
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
                submitBtn.style.cursor = "pointer";
            } else {
                submitBtn.disabled = true;
                submitBtn.style.opacity = "0.5";
                submitBtn.style.cursor = "not-allowed";
            }
        }

        [nameInput, emailInput, passwordInput, confirmInput].forEach(input => {
            input.addEventListener('input', validateForm);
        });
    </script>
</body>
</html>
