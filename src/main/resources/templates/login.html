<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - TaskFlow</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <!-- Logo Section -->
            <div class="auth-logo">
                <div class="logo-icon">✓</div>
                <h1 class="logo-text">TaskFlow</h1>
            </div>

            <h2 class="auth-title">Login</h2>
            <p class="auth-subtitle">Welcome back! Please login to your account.</p>

            <!-- Notification Box -->
            <div th:if="${error}" class="notification notification-error">
                <span th:text="${error}"></span>
                <button class="notification-close-btn" type="button" onclick="this.parentElement.style.display='none'">×</button>
            </div>
            
            <div th:if="${msg}" class="notification notification-success">
                <span th:text="${msg}"></span>
                <button class="notification-close-btn" type="button" onclick="this.parentElement.style.display='none'">×</button>
            </div>

            <form th:action="@{/login}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                        <input type="email" id="email" name="email" th:value="${loginData?.email}" placeholder="example@gmail.com" required />
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 1a11 11 0 110 22 11 11 0 010-22zm-2 11a2 2 0 104 0 2 2 0 00-4 0z"/>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required />
                    </div>
                </div>

                <button type="submit" class="btn-submit">Login</button>
            </form>

            <p class="auth-link">
                Don't have an account? <a th:href="@{/register}">Register here</a>
            </p>
        </div>
    </div>
</body>
</html>
